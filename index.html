<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Student Tools</title>
  <meta name="description" content="Free student tools: GPA calculator, study timer, task planner, and notes." />
  <meta name="theme-color" content="#2563eb" />

  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Student Tools" />
  <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/3135/3135755.png" />

  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, Arial, sans-serif;
      background: #f3f7fd;
      color: #111827;
    }

    .container {
      max-width: 900px;
      margin: auto;
      padding: 20px;
    }

    .header {
      text-align: center;
      margin-bottom: 20px;
    }

    .header h1 {
      margin: 0;
      font-size: 34px;
    }

    .header p {
      color: #6b7280;
      margin-top: 8px;
    }

    .card {
      background: white;
      border-radius: 22px;
      padding: 20px;
      margin-bottom: 18px;
      box-shadow: 0 8px 22px rgba(0,0,0,0.08);
    }

    h2 {
      margin-top: 0;
      font-size: 24px;
    }

    input, textarea {
      width: 100%;
      padding: 14px;
      margin: 8px 0;
      border: 1px solid #d1d5db;
      border-radius: 14px;
      font-size: 16px;
      box-sizing: border-box;
    }

    textarea {
      min-height: 120px;
      resize: vertical;
    }

    button {
      width: 100%;
      padding: 14px;
      margin-top: 10px;
      border: none;
      border-radius: 14px;
      background: #2563eb;
      color: white;
      font-size: 16px;
      font-weight: bold;
    }

    .secondary {
      background: #10b981;
    }

    .danger {
      background: #ef4444;
    }

    .result {
      margin-top: 12px;
      padding: 12px;
      border-radius: 14px;
      background: #eff6ff;
      color: #2563eb;
      font-weight: bold;
      text-align: center;
    }

    #time {
      text-align: center;
      font-size: 48px;
      font-weight: 800;
      margin: 12px 0;
    }

    ul {
      list-style: none;
      padding: 0;
      margin-top: 12px;
    }

    li {
      background: #f3f4f6;
      border-radius: 12px;
      padding: 12px;
      margin-top: 8px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
    }

    .small-delete {
      width: auto;
      padding: 8px 10px;
      margin: 0;
      background: #ef4444;
      border-radius: 10px;
      font-size: 14px;
    }

    .footer {
      text-align: center;
      color: #6b7280;
      font-size: 13px;
      margin-top: 20px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>🎓 Student Tools</h1>
      <p>Your simple student helper</p>
    </div>

    <div class="card">
      <h2>📊 GPA Calculator</h2>
      <input id="g1" type="number" placeholder="Grade 1" />
      <input id="g2" type="number" placeholder="Grade 2" />
      <input id="g3" type="number" placeholder="Grade 3" />
      <button onclick="calcGPA()">Calculate GPA</button>
      <div class="result" id="gpaResult">Your GPA result will appear here.</div>
    </div>

    <div class="card">
      <h2>⏱️ Study Timer</h2>
      <div id="time">25:00</div>
      <button onclick="startTimer()">Start Timer</button>
      <button class="secondary" onclick="resetTimer()">Reset Timer</button>
      <div class="result" id="timerMessage">Stay focused and keep going.</div>
    </div>

    <div class="card">
      <h2>📅 Study Planner</h2>
      <input id="task" type="text" placeholder="Enter your task" />
      <button onclick="addTask()">Add Task</button>
      <ul id="taskList"></ul>
    </div>

    <div class="card">
      <h2>📝 Notes</h2>
      <textarea id="notes" placeholder="Write your notes here..."></textarea>
      <button onclick="saveNotes()">Save Notes</button>
      <button class="danger" onclick="clearNotes()">Clear Notes</button>
      <div class="result" id="notesMessage">Your notes are ready.</div>
    </div>

    <div class="footer">
      Student Tools
    </div>
  </div>

  <script>
    function calcGPA() {
      let a = parseFloat(document.getElementById("g1").value) || 0;
      let b = parseFloat(document.getElementById("g2").value) || 0;
      let c = parseFloat(document.getElementById("g3").value) || 0;
      let avg = (a + b + c) / 3;
      document.getElementById("gpaResult").innerText = "GPA: " + avg.toFixed(2);
    }

    let timerSeconds = 1500;
    let timerInterval = null;

    function updateTimerDisplay() {
      let minutes = Math.floor(timerSeconds / 60);
      let seconds = timerSeconds % 60;
      document.getElementById("time").innerText =
        minutes + ":" + (seconds < 10 ? "0" : "") + seconds;
    }

    function startTimer() {
      if (timerInterval) return;
      document.getElementById("timerMessage").innerText = "Timer is running.";
      timerInterval = setInterval(() => {
        if (timerSeconds > 0) {
          timerSeconds--;
          updateTimerDisplay();
        } else {
          clearInterval(timerInterval);
          timerInterval = null;
          document.getElementById("timerMessage").innerText = "Study session finished.";
        }
      }, 1000);
    }

    function resetTimer() {
      clearInterval(timerInterval);
      timerInterval = null;
      timerSeconds = 1500;
      updateTimerDisplay();
      document.getElementById("timerMessage").innerText = "Timer reset to 25:00.";
    }

    function addTask() {
      let taskInput = document.getElementById("task");
      let taskText = taskInput.value.trim();
      if (!taskText) return;

      let li = document.createElement("li");
      let span = document.createElement("span");
      span.innerText = taskText;

      let delBtn = document.createElement("button");
      delBtn.innerText = "Delete";
      delBtn.className = "small-delete";
      delBtn.onclick = function () {
        li.remove();
      };

      li.appendChild(span);
      li.appendChild(delBtn);
      document.getElementById("taskList").appendChild(li);
      taskInput.value = "";
    }

    function saveNotes() {
      let notes = document.getElementById("notes").value;
      localStorage.setItem("student_notes", notes);
      document.getElementById("notesMessage").innerText = "Notes saved successfully.";
    }

    function clearNotes() {
      localStorage.removeItem("student_notes");
      document.getElementById("notes").value = "";
      document.getElementById("notesMessage").innerText = "Notes cleared.";
    }

    window.onload = function () {
      updateTimerDisplay();
      let savedNotes = localStorage.getItem("student_notes");
      if (savedNotes) {
        document.getElementById("notes").value = savedNotes;
      }
    };
  </script>
</body>
</html>
