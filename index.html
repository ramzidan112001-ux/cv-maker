<h1>🎓 Student Tools</h1>

<!-- GPA -->
<div style="background:white; padding:20px; margin:20px; border-radius:10px;">
  <h2>📊 GPA Calculator</h2>
  <input id="g1" placeholder="Grade 1"><br><br>
  <input id="g2" placeholder="Grade 2"><br><br>
  <input id="g3" placeholder="Grade 3"><br><br>
  <button onclick="calc()">Calculate</button>
  <h3 id="res"></h3>
</div>

<!-- Timer -->
<div style="background:white; padding:20px; margin:20px; border-radius:10px;">
  <h2>⏱️ Study Timer</h2>
  <h1 id="time">25:00</h1>
  <button onclick="start()">Start</button>
</div>

<script>
function calc() {
  let a = +g1.value || 0;
  let b = +g2.value || 0;
  let c = +g3.value || 0;
  let avg = (a+b+c)/3;
  res.innerText = "GPA: " + avg.toFixed(2);
}

let t = 1500;
function start(){
  setInterval(()=>{
    t--;
    let m = Math.floor(t/60);
    let s = t%60;
    time.innerText = m+":"+(s<10?"0":"")+s;
  },1000);
}
</script>
