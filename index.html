<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Student Tools</title>
</head>
<body style="text-align:center; font-family:Arial; background:#f5f7fb;">

  <h1>🎓 Student Tools</h1>

  <h2>GPA Calculator</h2>
  <input id="g1" placeholder="Grade 1"><br><br>
  <input id="g2" placeholder="Grade 2"><br><br>
  <input id="g3" placeholder="Grade 3"><br><br>

  <button onclick="calc()">Calculate</button>

  <h3 id="result"></h3>

  <script>
    function calc() {
      let a = Number(document.getElementById("g1").value);
      let b = Number(document.getElementById("g2").value);
      let c = Number(document.getElementById("g3").value);

      let avg = (a + b + c) / 3;
      document.getElementById("result").innerText = "GPA: " + avg;
    }
  </script>

</body>
</html>
