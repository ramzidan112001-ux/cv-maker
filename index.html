<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>RealRush</title>
<style>
body { font-family: Arial; text-align: center; background: #111; color: white; }
button { padding: 15px; font-size: 18px; margin: 10px; border-radius: 10px; }
#timer { font-size: 30px; margin: 20px; }
</style>
</head>

<body>

<h1>🔥 RealRush</h1>
<p>عندك دقيقتين فقط!</p>

<div id="timer">120</div>

<input type="file" accept="image/*,video/*" id="upload">
<br>
<button onclick="start()">ابدأ</button>

<script>
let time = 120;
let interval;

function start() {
    clearInterval(interval);
    time = 120;
    interval = setInterval(() => {
        document.getElementById("timer").innerText = time;
        time--;
        if (time < 0) {
            clearInterval(interval);
            alert("انتهى الوقت!");
        }
    }, 1000);
}
</script>

</body>
</html>
