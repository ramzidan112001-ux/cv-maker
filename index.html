<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Student Tools Pro</title>

<!-- Google AdSense -->
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=YOUR-ADSENSE-ID"
     crossorigin="anonymous"></script>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#f4f7fb;
}
.container{
  max-width:900px;
  margin:auto;
  padding:15px;
}
h1{margin:0}
.card{
  background:white;
  padding:20px;
  border-radius:20px;
  margin-top:15px;
}
button{
  padding:10px;
  border:none;
  border-radius:10px;
  background:#2563eb;
  color:white;
  font-weight:bold;
  margin-top:10px;
}
input{
  width:100%;
  padding:10px;
  border-radius:10px;
  border:1px solid #ddd;
  margin-top:5px;
}
.result{
  margin-top:10px;
  font-weight:bold;
  text-align:center;
}
.top-ad,.bottom-ad{
  margin-top:15px;
  padding:15px;
  border-radius:15px;
  border:2px dashed #ccc;
  text-align:center;
}
</style>
</head>

<body>

<div class="container">

<h1>🎓 Student Tools Pro</h1>

<!-- Top Ad -->
<div class="top-ad">
<ins class="adsbygoogle"
     style="display:block"
     data-ad-client="YOUR-ADSENSE-ID"
     data-ad-slot="YOUR-TOP-AD-SLOT"
     data-ad-format="auto"
     data-full-width-responsive="true"></ins>
</div>

<div class="card">
<h2>📊 GPA Calculator</h2>
<input id="g1" placeholder="Grade 1">
<input id="g2" placeholder="Grade 2">
<input id="g3" placeholder="Grade 3">
<button onclick="gpa()">Calculate</button>
<div class="result" id="gpa"></div>
</div>

<div class="card">
<h2>📐 Percentage</h2>
<input id="score" placeholder="Score">
<input id="total" placeholder="Total">
<button onclick="percent()">Calculate</button>
<div class="result" id="per"></div>
</div>

<div class="card">
<h2>⏱ Timer</h2>
<div id="time">25:00</div>
<button onclick="start()">Start</button>
<button onclick="reset()">Reset</button>
</div>

<div class="card">
<h2>📅 Tasks</h2>
<input id="task">
<button onclick="add()">Add</button>
<ul id="list"></ul>
</div>

<div class="card">
<h2>📝 Notes</h2>
<textarea id="notes" style="width:100%;height:100px"></textarea>
<button onclick="save()">Save</button>
</div>

<!-- Bottom Ad -->
<div class="bottom-ad">
<ins class="adsbygoogle"
     style="display:block"
     data-ad-client="YOUR-ADSENSE-ID"
     data-ad-slot="YOUR-BOTTOM-AD-SLOT"
     data-ad-format="auto"
     data-full-width-responsive="true"></ins>
</div>

</div>

<script>
function gpa(){
let a=+g1.value||0;
let b=+g2.value||0;
let c=+g3.value||0;
gpa.innerText="GPA: "+((a+b+c)/3).toFixed(2);
}

function percent(){
let s=+score.value||0;
let t=+total.value||0;
per.innerText="Percentage: "+((s/t)*100).toFixed(2)+"%";
}

let sec=1500,interval;

function start(){
interval=setInterval(()=>{
if(sec>0){
sec--;
time.innerText=Math.floor(sec/60)+":"+(sec%60<10?"0":"")+sec%60;
}
},1000);
}

function reset(){
clearInterval(interval);
sec=1500;
time.innerText="25:00";
}

function add(){
let li=document.createElement("li");
li.innerText=task.value;
list.appendChild(li);
task.value="";
}

function save(){
localStorage.setItem("notes",notes.value);
}

window.onload=()=>{
notes.value=localStorage.getItem("notes")||"";
try{
(adsbygoogle = window.adsbygoogle || []).push({});
(adsbygoogle = window.adsbygoogle || []).push({});
}catch(e){}
}
</script>

</body>
</html>
